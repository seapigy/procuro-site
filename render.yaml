services:
  - type: web
    name: procuroapp
    env: node
    rootDir: .
    buildCommand: NPM_CONFIG_PRODUCTION=false npm run install:all && npm run build:render
    startCommand: npm run start:render
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: QUICKBOOKS_ENVIRONMENT
        value: sandbox
